<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>怪異標識</title>
  <link rel="stylesheet" href="./assets/common/app.css">
</head>
<body>
  <main class="page">
    <section class="card">
      <p class="eyebrow">Host Mode</p>
      <h2>出題者用　一台完結プロンプト</h2>
      <p>家庭内で、1台の端末と1つの一時チャットだけで遊ぶための開始用プロンプトです。</p>
      <p>出題者がコピーして一時チャットに貼り、ChatGPTが最初の案内文を返したら、その画面をプレイヤーに見せてください。</p>
      <p class="muted">コピーされるのは短い読み込み用プロンプトです。真相・判定条件・エンディング本文は、チャットの貼り付け欄には直接表示されません。ただし出題者向けの導線なので、プレイヤーには操作させないでください。</p>
      <div class="controls">
        <button type="button" id="copy-host-one-chat-prompt">出題者用プロンプトをコピー</button>
      </div>
      <p class="muted" id="copy-host-one-chat-prompt-status"></p>
    </section>

    <section class="card hero">
      <p class="eyebrow">Kaiki Sign Game</p>
      <h1>怪異標識</h1>
      <p>標識を読み、どう行動するかを答えるホラー謎解きゲームです。</p>
      <a class="button" href="./episodes/ep01/">第1話を始める</a>
    </section>
  </main>
  <script>
    const ep01Url = new URL('./episodes/ep01/', location.href).href;
    const promptUrl = new URL('./prompts/ep01_host_one_chat_prompt.txt', location.href).href;

    async function copyText(text, statusEl) {
      try {
        await navigator.clipboard.writeText(text);
        statusEl.textContent = 'コピーしました。';
      } catch (error) {
        statusEl.textContent = 'コピーに失敗しました。ページを再読み込みして、もう一度試してください。';
      }
    }

    const hostCopyBtn = document.getElementById('copy-host-one-chat-prompt');
    const hostStatus = document.getElementById('copy-host-one-chat-prompt-status');
    hostCopyBtn.addEventListener('click', async () => {
      const loaderPrompt = `あなたは『怪異標識』EP01のゲームマスターです。\n\n次のURLにある出題者用指示書を開き、内容を読んでください。\nその指示に従って、このチャットだけで開始案内、回答受付、判定、エンディング出力まで行ってください。\n\n出題者用指示書URL：\n${promptUrl}\n\nプレイヤーが見る公開ページURL：\n${ep01Url}\n\n重要：\n- URL先の指示書を読めた場合、最初の返答はプレイヤー向け案内だけにしてください。\n- URL先の指示書を読めない場合は、「出題者用指示書を読めませんでした。出題者に確認してください。」とだけ返してください。\n- 判定前に真相・判定条件・エンディングを説明しないでください。\n- ヒントや質問回答は行わず、プレイヤーの最終回答だけを受け付けてください。`;
      await copyText(loaderPrompt, hostStatus);
    });
  </script>
</body>
</html>
