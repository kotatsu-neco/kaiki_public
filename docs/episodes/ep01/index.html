<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>怪異標識 第1話</title>
  <link rel="stylesheet" href="../../assets/common/app.css">
</head>
<body>
  <main class="page">
    <section class="card">
      <p class="eyebrow">Episode</p>
      <h1 data-title></h1>
      <div data-intro></div>
    </section>

    <section class="card">
      <p class="muted">画像を順番に確認してください。</p>
      <p><span class="step-label" data-label></span> <span class="muted" data-count></span></p>
      <div class="viewer-image"><img data-image src="" alt=""></div>
      <div class="controls">
        <button class="secondary" data-prev>前へ</button>
        <button data-next>次へ</button>
      </div>
    </section>

    <section class="card hidden" data-final-section>
      <h2>最終状況</h2>
      <div data-final></div>
      <p><strong>あなたはどうするか。行動と理由を自由に書いてください。</strong></p>
      <textarea class="answer-box" data-answer placeholder="私は……する。理由は……だから。"></textarea>
      <div class="controls">
        <button data-copy>回答をコピー</button>
      </div>
      <p class="muted">コピーした回答を、出題者のChatGPT判定用チャットに貼ってください。</p>
    </section>
  </main>
  <script src="../../assets/common/app.js"></script>
</body>
</html>
